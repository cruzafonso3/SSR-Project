<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>%TITLE%</title>
  <style>
    :root { 
      --primary: #6366f1; 
      --primary-dark: #4f46e5; 
      --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      --bg: #0f172a; 
      --card-bg: #1e293b; 
      --text: #e2e8f0; 
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { background: var(--bg); color: var(--text); padding-bottom: 30px; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .header { 
      background: var(--primary-grad); 
      color: white; 
      padding: 30px; 
      border-radius: 16px; 
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3); 
      margin-bottom: 25px; 
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    .header h1 { position: relative; z-index: 1; font-size: 1.8rem; margin-bottom: 10px; font-weight: 700; }
    .card { 
      background: var(--card-bg); 
      border-radius: 16px; 
      padding: 24px; 
      margin-bottom: 20px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    h2 { 
      font-size: 1.3rem; 
      margin-bottom: 18px; 
      border-bottom: 2px solid var(--border); 
      padding-bottom: 12px;
      color: var(--text);
      font-weight: 600;
    }
    .btn { 
      display: inline-block; 
      width: 100%; 
      padding: 14px; 
      border: none; 
      border-radius: 10px; 
      background: var(--primary-grad); 
      color: white; 
      font-weight: 600; 
      cursor: pointer; 
      text-decoration: none; 
      margin-bottom: 12px; 
      text-align: center;
      transition: all 0.2s;
      font-size: 0.95rem;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn.secondary { background: #475569; } 
    .btn.secondary:hover { background: #64748b; box-shadow: 0 4px 12px rgba(71, 85, 105, 0.4); }
    .btn.danger { background: var(--danger); } 
    .btn.danger:hover { background: #dc2626; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4); }
    .btn.success { background: var(--success); } 
    .btn.success:hover { background: #059669; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); }
    input[type="text"], input[type="password"], input[type="email"], textarea, select { 
      width: 100%; 
      padding: 14px; 
      border: 1px solid var(--border); 
      border-radius: 10px; 
      margin-bottom: 12px;
      background: #0f172a;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .table-container { overflow-x: auto; border-radius: 10px; } 
    table { width: 100%; border-collapse: collapse; } 
    th {
      background: #0f172a;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 14px;
      text-align: left;
      border-bottom: 2px solid var(--border);
    }
    td { 
      padding: 14px; 
      text-align: left; 
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:hover td {
      background: rgba(99, 102, 241, 0.05);
    }
    .status-badge { 
      padding: 6px 14px; 
      border-radius: 20px; 
      font-size: 0.85rem; 
      background: #334155; 
      color: var(--text-muted);
      font-weight: 600;
      display: inline-block;
    }
    .active-badge { 
      background: rgba(16, 185, 129, 0.2); 
      color: var(--success); 
      padding: 6px 14px; 
      border-radius: 20px; 
      font-size: 0.85rem; 
      font-weight: 600;
      display: inline-block;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .live-dot { 
      height: 8px; 
      width: 8px; 
      background-color: var(--success); 
      border-radius: 50%; 
      display: inline-block; 
      animation: blink 1.5s infinite; 
      margin-right: 6px;
      box-shadow: 0 0 8px var(--success);
    }
    @keyframes blink { 
      0%, 100% { opacity: 1; transform: scale(1); } 
      50% { opacity: 0.4; transform: scale(0.8); } 
    }
    .cred-box { 
      background: rgba(245, 158, 11, 0.1); 
      border-left: 4px solid var(--warning); 
      padding: 16px; 
      margin-bottom: 12px; 
      word-wrap: break-word;
      border-radius: 8px;
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .scan-info {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 15px;
      font-style: italic;
    }
    .modal { 
      display: none; 
      position: fixed; 
      z-index: 1000; 
      left: 0; 
      top: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
    }
    .modal-content { 
      background: var(--card-bg); 
      margin: 10% auto; 
      padding: 30px; 
      border-radius: 16px; 
      width: 90%; 
      max-width: 450px; 
      position: relative;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .close { 
      position: absolute; 
      right: 20px; 
      top: 15px; 
      font-size: 28px; 
      cursor: pointer; 
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .close:hover { color: var(--text); }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 45px; }
    .toggle-pw { 
      position: absolute; 
      right: 12px; 
      top: 50%; 
      transform: translateY(-50%); 
      background: none; 
      border: none; 
      cursor: pointer; 
      font-size: 20px;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }
    .modal-btns { display: flex; gap: 12px; margin-top: 18px; }
    .modal-btns .btn { margin-bottom: 0; }
    label {
      display: block;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 8px;
      font-weight: 500;
    }
    @media (min-width: 600px) { 
      .btn-group { display: flex; gap: 12px; } 
      .btn { margin-bottom: 0; } 
    }
  </style>
</head>
<body><div class="container">
